<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B1B36">
<title>Totem de Login — TJE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="icon" type="image/png" href="tje2026.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="hero-game-bg" aria-hidden="true">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
  <div class="cloud cloud-5"></div>
  <div class="cloud cloud-6"></div>
  <div class="cloud cloud-7"></div>
  <div class="cloud cloud-8"></div>
</div>

<div class="totem-card">
  <div class="totem-brand">
    <img src="tje2026.png" alt="TJE 2026">
    <h1>Totem de Login</h1>
    <p>TJE 2026 — Colégio Estadual Malba Tahan</p>
  </div>

  <form id="formTotem" autocomplete="off">
    <div class="totem-field">
      <label for="totemId">ID do participante</label>
      <input type="text" id="totemId" placeholder="TJE2026-0001" required autofocus>
    </div>
    <div class="totem-field">
      <label for="totemSenha">Senha</label>
      <input type="password" id="totemSenha" placeholder="Digite sua senha" required>
    </div>
    <button type="submit" class="btn-totem" id="btnTotemEntrar">Entrar</button>
  </form>
</div>

<div class="overlay-resultado hidden" id="overlayResultado">
  <i id="overlayIcone" class="fa-solid fa-circle-check"></i>
  <span id="overlayTexto">Entrada confirmada</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/nuvens.js"></script>
<script src="js/totem.js"></script>
</body>
</html>
